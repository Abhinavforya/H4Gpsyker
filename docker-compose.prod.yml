version: '3.8'

services:
  nginx:
    image: nginx:alpine
    container_name: ascii-framer-nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./certs:/etc/letsencrypt:ro
    depends_on:
      - frontend
      - backend
    networks:
      - ascii-framer-network
    restart: unless-stopped

  frontend:
    build:
      context: ./ascii-framer
      dockerfile: Dockerfile
    container_name: ascii-framer-frontend
    expose:
      - "3000"
    environment:
      - REACT_APP_API_URL=/api
    depends_on:
      - backend
    networks:
      - ascii-framer-network
    restart: unless-stopped

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: ascii-framer-backend
    expose:
      - "5000"
    environment:
      - NODE_ENV=production
      - PORT=5000
      - AWS_REGION=${AWS_REGION:-us-east-1}
      - S3_UPLOAD_BUCKET=${S3_UPLOAD_BUCKET}
      - S3_UPLOAD_PREFIX=${S3_UPLOAD_PREFIX:-ascii-framer/uploads}
      - S3_PUBLIC_BASE_URL=${S3_PUBLIC_BASE_URL:-}
    networks:
      - ascii-framer-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:5000/api/health"]
      interval: 10s
      timeout: 5s
      retries: 5

networks:
  ascii-framer-network:
    driver: bridge
