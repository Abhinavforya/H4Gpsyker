<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Saved Spotify Artworks</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #050510;
      --panel: rgba(255, 255, 255, 0.06);
      --line: rgba(255, 255, 255, 0.12);
      --text: #e2e8f0;
      --muted: #94a3b8;
      --green: #34d399;
      --pink: #f472b6;
      --blue: #60a5fa;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      background:
        radial-gradient(circle at top left, rgba(52, 211, 153, 0.18), transparent 34rem),
        radial-gradient(circle at bottom right, rgba(96, 165, 250, 0.18), transparent 30rem),
        var(--bg);
      color: var(--text);
      font-family: Inter, system-ui, sans-serif;
    }

    header {
      position: sticky;
      top: 0;
      z-index: 2;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 1rem;
      padding: 1rem clamp(1rem, 4vw, 3rem);
      background: rgba(5, 5, 16, 0.82);
      border-bottom: 1px solid var(--line);
      backdrop-filter: blur(18px);
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 0.8rem;
      min-width: 0;
    }

    .mark {
      width: 2.5rem;
      height: 2.5rem;
      display: grid;
      place-items: center;
      border-radius: 0.8rem;
      background: linear-gradient(135deg, var(--green), var(--blue), var(--pink));
      color: #061015;
      font-weight: 800;
    }

    h1 {
      margin: 0;
      font-family: "Space Mono", monospace;
      font-size: clamp(1.2rem, 3vw, 1.6rem);
      letter-spacing: 0;
    }

    a {
      color: inherit;
    }

    .nav {
      display: flex;
      align-items: center;
      gap: 0.8rem;
      flex-wrap: wrap;
      justify-content: flex-end;
    }

    .button {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 2.3rem;
      padding: 0.55rem 0.9rem;
      border: 1px solid var(--line);
      border-radius: 0.6rem;
      background: rgba(255, 255, 255, 0.07);
      color: var(--text);
      font-size: 0.88rem;
      font-weight: 600;
      text-decoration: none;
    }

    main {
      width: min(1180px, calc(100% - 2rem));
      margin: 0 auto;
      padding: 2rem 0 4rem;
    }

    .summary {
      display: flex;
      align-items: end;
      justify-content: space-between;
      gap: 1rem;
      margin-bottom: 1.4rem;
    }

    .summary p {
      margin: 0.45rem 0 0;
      color: var(--muted);
      line-height: 1.6;
      max-width: 680px;
    }

    .count {
      font-family: "Space Mono", monospace;
      color: var(--green);
      white-space: nowrap;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
      gap: 1rem;
    }

    .card {
      overflow: hidden;
      border: 1px solid var(--line);
      border-radius: 0.7rem;
      background: var(--panel);
      box-shadow: 0 22px 60px rgba(0, 0, 0, 0.22);
    }

    .preview {
      display: block;
      width: 100%;
      aspect-ratio: 5 / 3;
      object-fit: cover;
      background: #050510;
      border-bottom: 1px solid var(--line);
    }

    .body {
      padding: 0.95rem;
    }

    .title {
      margin: 0 0 0.35rem;
      font-size: 1rem;
      line-height: 1.35;
    }

    .meta {
      margin: 0;
      color: var(--muted);
      font-size: 0.86rem;
      line-height: 1.5;
    }

    .links {
      display: flex;
      flex-wrap: wrap;
      gap: 0.5rem;
      margin-top: 0.9rem;
    }

    .links a {
      padding: 0.42rem 0.62rem;
      border: 1px solid var(--line);
      border-radius: 0.5rem;
      color: var(--text);
      font-size: 0.8rem;
      text-decoration: none;
      background: rgba(255, 255, 255, 0.06);
    }

    .empty {
      padding: 2rem;
      border: 1px dashed var(--line);
      border-radius: 0.7rem;
      color: var(--muted);
      text-align: center;
      background: rgba(255, 255, 255, 0.04);
    }

    @media (max-width: 680px) {
      header,
      .summary {
        align-items: flex-start;
        flex-direction: column;
      }

      .nav {
        justify-content: flex-start;
      }
    }
  </style>
</head>
<body>
  <header>
    <div class="brand">
      <div class="mark">♫</div>
      <h1>Saved Spotify Artworks</h1>
    </div>
    <nav class="nav">
      <a class="button" href="/cozy-player">Cozy Player</a>
      <a class="button" href="/midi-to-image/index.html">MIDI Studio</a>
    </nav>
  </header>

  <main>
    <section class="summary">
      <div>
        <h2>Every fifth track becomes an art folder</h2>
        <p>Each saved item contains a 20-second MIDI representation plus SVG and ASCII outputs in <code>generated-artworks/</code>.</p>
      </div>
      <div class="count" id="count">Loading...</div>
    </section>

    <section class="grid" id="grid"></section>
  </main>

  <script>
    const grid = document.getElementById('grid');
    const count = document.getElementById('count');

    function escapeHtml(value) {
      return String(value || '').replace(/[&<>"']/g, char => ({
        '&': '&amp;',
        '<': '&lt;',
        '>': '&gt;',
        '"': '&quot;',
        "'": '&#39;',
      }[char]));
    }

    function formatDate(value) {
      try {
        return new Intl.DateTimeFormat(undefined, {
          dateStyle: 'medium',
          timeStyle: 'short',
        }).format(new Date(value));
      } catch (_) {
        return value || '';
      }
    }

    async function loadGallery() {
      try {
        const response = await fetch('/api/artworks');
        if (!response.ok) throw new Error('Could not load artworks');
        const data = await response.json();
        const artworks = data.artworks || [];
        count.textContent = `${artworks.length} saved`;

        if (!artworks.length) {
          grid.innerHTML = '<div class="empty">No saved artworks yet. Play Spotify in Cozy Player; every fifth new track will appear here.</div>';
          return;
        }

        grid.innerHTML = artworks.map(item => `
          <article class="card">
            <img class="preview" src="${item.files.svg}" alt="Generated art for ${escapeHtml(item.track?.name)}">
            <div class="body">
              <h3 class="title">${escapeHtml(item.track?.name || 'Untitled track')}</h3>
              <p class="meta">${escapeHtml(item.track?.artists || 'Unknown artist')}</p>
              <p class="meta">${formatDate(item.createdAt)} · ${item.captureSeconds || 20}s · ${item.noteCount || 0} notes · ${item.bpm || 120} BPM</p>
              <div class="links">
                <a href="${item.files.svg}" target="_blank" rel="noreferrer">SVG</a>
                <a href="${item.files.ascii}" target="_blank" rel="noreferrer">ASCII</a>
                <a href="${item.files.midiFile || item.files.midi}" target="_blank" rel="noreferrer">MIDI</a>
                <a href="${item.files.midi}" target="_blank" rel="noreferrer">MIDI JSON</a>
                <a href="${item.files.metadata}" target="_blank" rel="noreferrer">Metadata</a>
              </div>
            </div>
          </article>
        `).join('');
      } catch (error) {
        count.textContent = 'Unavailable';
        grid.innerHTML = `<div class="empty">${escapeHtml(error.message)}</div>`;
      }
    }

    loadGallery();
  </script>
</body>
</html>
